<body>
    <div class="topbar">
        <img class="topbar-logo" src="/web/hmss/img/logo.png">
        <p>Home Media Streaming Service</p>
        <small>By Serafino Barwinski</small>
    </div>
    <div class="center">
        <h1>Welcome to HMSS</h1>
        <strong id="InformTextWhichDesign">HMSS offers the option to use the Jellyfin design or the HMSS design. Which one
            would you like to use?</strong><br>
        <button id="useJDesign" class="JButton">Jellyfin´s Design</button><button id="useHMSSDesign"
            class="HButton">HMSS Design</button>
    </div>
    <script>
        var currDesign = localStorage.getItem("HMSSDesign")
        if (currDesign == "J") {
            window.location.replace("/web/index.html");
        } else if (currDesign == "H") {
            // HMSS frontend — coming soon
        } else {
            document.getElementById("useJDesign").addEventListener("click", () => {
                localStorage.setItem("HMSSDesign", "J");
                window.location.replace("/web/index.html");
            });
            document.getElementById("useHMSSDesign").addEventListener("click", () => {
                localStorage.setItem("HMSSDesign", "H");
                // HMSS frontend — coming soon
            });
        }
    </script>
