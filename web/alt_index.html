<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #ddd; font: 14px system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { color: #00bcd4; margin-bottom: 20px; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; margin-bottom: 12px; width: 100%; }
input, button { background: #111; border: 1px solid #333; color: #eee; padding: 10px 14px; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 8px; }
button { background: #00bcd4; color: #000; border: none; cursor: pointer; font-weight: 600; }
button:hover { background: #0097a7; }
.hidden { display: none; }
.error { color: #f44336; font-size: 12px; margin-bottom: 8px; }
.item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; cursor: pointer; }
.item:hover { background: #1e1e1e; }
.item .name { flex: 1; }
.item .type { color: #666; font-size: 11px; }
</style>
</head>
<body>
<h1>HMSS</h1>

<div id="login" class="card">
    <input id="username" placeholder="Username" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <div id="login-error" class="error hidden"></div>
    <button id="btn-login">Sign In</button>
</div>

<div id="dashboard" class="card hidden">
    <p>Welcome, <b id="user-name"></b>!</p>
    <div id="items"></div>
</div>

<script>
const BASE = "";
let token = null;

document.getElementById("btn-login").addEventListener("click", async () => {
    const name = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const errEl = document.getElementById("login-error");
    errEl.classList.add("hidden");

    try {
        const resp = await fetch(`${BASE}/Users/AuthenticateByName`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ Username: name, Pw: pass }),
        });
        const data = await resp.json();
        if (!resp.ok) { errEl.textContent = data.error || "Login failed"; errEl.classList.remove("hidden"); return; }

        token = data.AccessToken;
        document.getElementById("login").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("user-name").textContent = data.User.Name;

        loadItems();
    } catch (e) {
        errEl.textContent = "Connection error";
        errEl.classList.remove("hidden");
    }
});

async function loadItems() {
    const resp = await fetch(`${BASE}/Items?accessToken=${token}`);
    const data = await resp.json();
    const container = document.getElementById("items");
    container.innerHTML = data.Items.map(i => `
        <div class="item">
            <span class="name">${i.Name}</span>
            <span class="type">${i.Type}</span>
        </div>
    `).join("");
}
</script>
</body>
